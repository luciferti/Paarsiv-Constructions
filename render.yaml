# Render Blueprint — creates the FastAPI backend + managed Postgres.
# In the Render dashboard: New → Blueprint → pick this repo → Apply.
#
# Free-plan notes:
# - Migrations run in startCommand (preDeployCommand needs a paid plan).
# - The service spins down when idle; first request after that takes
#   ~30-60s (cold start).
# - The disk is ephemeral: uploaded invoice files vanish on redeploy.
#   Wire S3 in backend/app/modules/invoice/services/file_storage.py
#   for durable files.

databases:
  - name: hrms-db
    plan: free

services:
  - type: web
    name: hrms-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DEMO_MODE
        value: "false"
      # Set to your Vercel URL after the frontend deploy,
      # e.g. https://your-app.vercel.app
      - key: FRONTEND_ORIGIN
        sync: false
